<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />
<link rel="icon" href="data:," />
<title>Missile Command</title>
<style>
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; overscroll-behavior:none; font-family: "Courier New", monospace; }
  canvas { display:block; width:100vw; height:100vh; image-rendering:pixelated; touch-action:none; }
  .hud { position:fixed; inset:0; pointer-events:none; display:flex; flex-direction:column; align-items:center; padding:8px 12px; box-sizing:border-box; user-select:none; }
  .score-bar { display:flex; justify-content:space-between; width:100%; max-width:600px; }
  .score-item { color:#f4f4f4; font-size:clamp(11px,2.2vw,15px); font-weight:700; text-shadow:0 0 6px rgba(0,255,65,.6); letter-spacing:.05em; }
  .lives-bar { display:flex; gap:6px; margin-top:4px; }
  .life-pip { width:clamp(8px,1.5vw,12px); height:clamp(8px,1.5vw,12px); background:#dfe7ea; border-radius:50%; box-shadow:0 0 4px rgba(255,255,255,.35); }
  .life-pip.lost { background:#3a2b25; box-shadow:none; }
  .wave-announce { position:fixed; left:50%; top:38%; transform:translate(-50%,-50%); color:#f4f4f4; font-size:clamp(28px,6vw,48px); font-weight:900; text-shadow:0 0 12px rgba(255,255,255,.3),0 0 30px rgba(255,140,60,.15); opacity:0; pointer-events:none; transition:opacity .3s; letter-spacing:.15em; }
  .wave-announce.show { opacity:1; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; user-select:none; }
  .overlay.hidden { display:none; }
  .overlay h1 { color:#f4f4f4; font-size:clamp(32px,7vw,56px); text-shadow:0 0 12px rgba(255,255,255,.25),0 0 28px rgba(255,140,60,.15); margin:0 0 10px; letter-spacing:.08em; }
  .overlay p { color:#cfd8df; font-size:clamp(12px,2.4vw,16px); margin:4px auto; text-shadow:0 0 8px rgba(0,255,65,.4); }
  .overlay .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .combo { position:fixed; left:50%; top:44%; transform:translate(-50%,-50%); color:#ffff00; font-size:clamp(24px,5vw,40px); font-weight:900; text-shadow:0 0 16px rgba(255,255,0,.8); opacity:0; pointer-events:none; user-select:none; }
  .combo.show { opacity:1; }
  .sound-toggle {
    position:fixed;
    top:10px;
    right:12px;
    z-index:20;
    pointer-events:auto;
    appearance:none;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(0,0,0,.55);
    color:#f4f4f4;
    font:700 clamp(10px,1.8vw,13px) "Courier New", monospace;
    letter-spacing:.08em;
    padding:7px 10px 6px;
    border-radius:999px;
    text-shadow:0 0 8px rgba(0,255,65,.45);
    box-shadow:0 0 10px rgba(0,0,0,.35), inset 0 0 10px rgba(255,255,255,.04);
  }
  .sound-toggle:active { transform:translateY(1px); }
  .sound-toggle.muted {
    color:#ffcf7a;
    text-shadow:0 0 8px rgba(255,180,70,.45);
    border-color:rgba(255,207,122,.45);
  }
  .pause-toggle {
    right:114px;
  }
  .pause-toggle.paused {
    color:#7be6ff;
    text-shadow:0 0 8px rgba(120,230,255,.45);
    border-color:rgba(123,230,255,.55);
  }
  .pause-overlay {
    z-index:24;
    background:rgba(0,0,0,.35);
  }
  .scanlines { position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px); z-index:10; }
  .vignette { position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%); z-index:9; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="pauseToggle" class="sound-toggle pause-toggle" type="button" aria-pressed="false">PAUSE</button>
<button id="soundToggle" class="sound-toggle" type="button" aria-pressed="false">SOUND ON</button>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="hud">
<div class="score-bar">
  <span class="score-item" id="scoreLabel">SCORE: 0</span>
  <span class="score-item" id="waveLabel">WAVE 1</span>
  <span class="score-item" id="highLabel">HIGH: 0</span>
</div>
<div class="lives-bar" id="livesBar">
  <span class="life-pip" id="pip0"></span>
  <span class="life-pip" id="pip1"></span>
  <span class="life-pip" id="pip2"></span>
  <span class="life-pip" id="pip3"></span>
  <span class="life-pip" id="pip4"></span>
  <span class="life-pip" id="pip5"></span>
</div>
</div>
<div id="waveAnnounce" class="wave-announce"></div>
<div id="combo" class="combo"></div>
<div id="pauseOverlay" class="overlay pause-overlay hidden">
  <h1>PAUSED</h1>
  <p>Press P, tap Pause, or return to the tab to resume.</p>
</div>
<div id="overlay" class="overlay">
  <h1>MISSILE COMMAND</h1>
  <p>Defend your six cities from incoming missiles!</p>
  <p>Tap to fire from the nearest silo. Survive the waves and earn bonus cities.</p>
  <p class="blink" style="margin-top:18px;">[ TAP TO START ]</p>
</div>
<script>
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreLabel');
const waveEl = document.getElementById('waveLabel');
const highEl = document.getElementById('highLabel');
const waveAnnEl = document.getElementById('waveAnnounce');
const comboEl = document.getElementById('combo');
const pauseOverlayEl = document.getElementById('pauseOverlay');
const overlayEl = document.getElementById('overlay');
const pauseEl = document.getElementById('pauseToggle');
const muteEl = document.getElementById('soundToggle');

// ─── State ───────────────────────────────────────────────────────────
const S = {
  running: false, gameOver: false, score: 0,
  high: Number(localStorage.getItem('mc_high') || 0),
  time: 0, wave: 0, lives: 3,
  spawnTimer: 0, spawnInterval: 1.4,
  explosions: [], interceptors: [], meteors: [],
  particles: [], floatingTexts: [], stars: [],
  terrain: null, groundY: 0,
  basePositions: [], cityPositions: [],
  lastPointerX: 0, lastPointerY: 0,
  audio: null, masterGain: null, audioPrimed: false, audioUnlockP: null, gestureLock: false, fireCooldown: 0,
  muted: localStorage.getItem('mc_muted') === '1',
  volume: 0.86,
  paused: false, pauseReason: '',
  comboCount: 0, comboTimer: 0, comboMult: 1,
  waveAnnTimer: 0, screenShake: 0,
  baseAmmo: [],
  totalMeteorsInWave: 0,
  saucer: null,
  saucerTimer: 0,
  gridLines: [],
  gameOverTime: 0,
  nextBonusCityAt: 10000,
  // City destruction animation
  cityDestructions: [],
};

window.__MC = S;

function rand(a,b){return Math.random()*(b-a)+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}

// ─── Audio ───────────────────────────────────────────────────────────
function audioInit() {
  try {
    if (!S.audio) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      S.audio = new AC({ latencyHint: 'interactive' });
      S.masterGain = S.audio.createGain();
      S.masterGain.gain.value = S.muted ? 0 : S.volume;
      S.masterGain.connect(S.audio.destination);
    }
    return S.audio;
  } catch (e) {
    return null;
  }
}

function updateMasterGain() {
  if (!S.masterGain) return;
  const target = S.muted ? 0 : S.volume;
  const now = S.audio ? S.audio.currentTime : 0;
  try {
    S.masterGain.gain.cancelScheduledValues(now);
    S.masterGain.gain.setTargetAtTime(target, now, 0.015);
  } catch (e) {
    S.masterGain.gain.value = target;
  }
}

function setMuted(next) {
  S.muted = !!next;
  localStorage.setItem('mc_muted', S.muted ? '1' : '0');
  updateMasterGain();
  syncMuteUi();
}

function syncMuteUi() {
  if (!muteEl) return;
  muteEl.textContent = S.muted ? 'SOUND OFF' : 'SOUND ON';
  muteEl.classList.toggle('muted', S.muted);
  muteEl.setAttribute('aria-pressed', S.muted ? 'true' : 'false');
}

function syncPauseUi() {
  if (!pauseEl) return;
  pauseEl.textContent = S.paused ? 'RESUME' : 'PAUSE';
  pauseEl.classList.toggle('paused', S.paused);
  pauseEl.setAttribute('aria-pressed', S.paused ? 'true' : 'false');
  if (pauseOverlayEl) pauseOverlayEl.classList.toggle('hidden', !S.paused);
}

function setPaused(next, reason = 'manual') {
  const shouldPause = !!next && S.running && !S.gameOver;
  if (shouldPause === S.paused) {
    if (!shouldPause) S.pauseReason = '';
    return S.paused;
  }
  S.paused = shouldPause;
  S.pauseReason = shouldPause ? reason : '';
  syncPauseUi();
  return S.paused;
}

function togglePause() {
  if (!S.running || S.gameOver) return false;
  return setPaused(!S.paused);
}

function resumeAudio() {
  const ac = audioInit();
  if (!ac) return Promise.resolve(false);
  if (ac.state === 'running') return Promise.resolve(true);
  if (S.audioUnlockP) return S.audioUnlockP;
  const timeoutMs = 300;
  S.audioUnlockP = Promise.race([
    ac.resume().then(() => ac.state === 'running').catch(() => false),
    new Promise((resolve) => setTimeout(() => resolve(ac.state === 'running'), timeoutMs)),
  ]).finally(() => { S.audioUnlockP = null; });
  return S.audioUnlockP;
}

function whenAudioReady(run, maxWait = 800) {
  const ac = audioInit();
  if (!ac) return false;
  if (ac.state === 'running') {
    run();
    return true;
  }
  void resumeAudio();
  const start = performance.now();
  const timer = setInterval(() => {
    if (ac.state === 'running') {
      clearInterval(timer);
      run();
      return;
    }
    if (performance.now() - start >= maxWait) {
      clearInterval(timer);
    }
  }, 25);
  return false;
}

function primeAudio() {
  const ac = audioInit();
  if (!ac) return false;
  return whenAudioReady(() => {
    if (S.audioPrimed || S.muted) return;
    try {
      const t = ac.currentTime;
      const osc1 = ac.createOscillator();
      const osc2 = ac.createOscillator();
      const g = ac.createGain();
      osc1.type = 'triangle';
      osc2.type = 'square';
      osc1.frequency.setValueAtTime(880, t);
      osc2.frequency.setValueAtTime(1320, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.085, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
      osc1.connect(g);
      osc2.connect(g);
      g.connect(S.masterGain || ac.destination);
      osc1.start(t);
      osc2.start(t);
      osc1.stop(t + 0.055);
      osc2.stop(t + 0.055);
      S.audioPrimed = true;
    } catch (e) {}
  }, 1000);
}

function playOsc(cfg) {
  const ac = audioInit(); if (!ac) return;
  if (S.muted) return;
  const run = () => {
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = cfg.type || 'sine';
    osc.frequency.setValueAtTime(cfg.start || 440, t);
    if (cfg.end !== undefined) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, cfg.end), t + (cfg.dur || 0.1));
    }
    const d = cfg.dur || 0.1;
    const gain = Math.max(cfg.gain || 0.1, 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.004);
    g.gain.setValueAtTime(gain, t + d * 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, t + d);
    osc.connect(g).connect(S.masterGain || ac.destination);
    osc.start(t);
    osc.stop(t + d + 0.02);
  };
  whenAudioReady(run, 700);
}

function playNoiseBurst({ dur = 0.12, gain = 0.12, type = 'bandpass', freq = 1200, q = 0.8 } = {}) {
  const ac = audioInit(); if (!ac) return;
  if (S.muted) return;
  const run = () => {
    const t = ac.currentTime;
    const len = Math.max(1, Math.floor(ac.sampleRate * dur));
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const env = 1 - i / len;
      data[i] = (Math.random() * 2 - 1) * env * 0.9;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = type;
    filt.frequency.setValueAtTime(freq, t);
    filt.Q.value = q;
    const g = ac.createGain();
    const peak = Math.max(gain, 0.10);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(filt).connect(g).connect(S.masterGain || ac.destination);
    src.start(t);
    src.stop(t + dur + 0.02);
  };
  whenAudioReady(run, 700);
}

// Authentic arcade sounds
function sndLaunch() {
  playOsc({type:'triangle',start:980,end:620,dur:0.065,gain:0.10});
}
function sndExplosion() {
  playNoiseBurst({dur:0.14, gain:0.15, type:'bandpass', freq:1000, q:0.65});
  playOsc({type:'sawtooth',start:170,end:42,dur:0.20,gain:0.08});
}
function sndBigBoom() {
  playNoiseBurst({dur:0.22, gain:0.18, type:'lowpass', freq:700, q:0.55});
  playOsc({type:'sawtooth',start:100,end:20,dur:0.34,gain:0.10});
}
function sndCityHit() {
  playOsc({type:'square',start:520,end:120,dur:0.14,gain:0.11});
  playOsc({type:'sawtooth',start:180,end:70,dur:0.17,gain:0.08});
}
function sndMeteorCrack() {
  playOsc({type:'square',start:1150,end:260,dur:0.05,gain:0.10});
}
function sndSaucerAppear() {
  playOsc({type:'square',start:180,end:260,dur:0.08,gain:0.09});
  playOsc({type:'square',start:180,end:260,dur:0.08,gain:0.09});
}
function sndSaucerBonus() {
  playOsc({type:'sine',start:620,end:1320,dur:0.20,gain:0.12});
}
function sndGameOver() {
  playOsc({type:'sawtooth',start:220,end:42,dur:0.58,gain:0.11});
  playOsc({type:'square',start:110,end:36,dur:0.24,gain:0.08});
}
function sndWaveStart() {
  playOsc({type:'sine',start:460,end:820,dur:0.14,gain:0.07});
}

// ─── Resize / Layout ─────────────────────────────────────────────────
function resize() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = Math.floor(innerWidth*dpr);
  canvas.height = Math.floor(innerHeight*dpr);
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  S.groundY = innerHeight - Math.max(48, innerHeight*0.08);
  initTerrain();
  layoutEntities();
  buildStars();
  buildGrid();
}

function initTerrain() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  S.terrain = new Float32Array(Math.ceil(innerWidth / dpr * dpr));
}

function layoutEntities() {
  const w = innerWidth;
  const cityXs = [0.10, 0.20, 0.31, 0.69, 0.80, 0.90].map(p => w * p);
  const baseXs = [0.22, 0.50, 0.78].map(p => w * p);
  S.cityPositions = cityXs.map((x, index) => ({ x, y: S.groundY - 3, alive: true, rubble: 0, index }));
  S.basePositions = baseXs.map((x, index) => ({ x, y: S.groundY, ammo: 10, alive: true, index }));
  S.baseAmmo = S.basePositions.map(() => 10);
}

function buildStars() {
  const count = Math.round((innerWidth*innerHeight)/25000);
  S.stars = Array.from({length:count}, ()=>({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight*0.55,
    r: rand(0.5,1.5), a: rand(0.2,0.7), s: rand(0.3,1.2)
  }));
}

function buildGrid() {
  S.gridLines = [];
  const spacing = 40;
  for (let x = spacing; x < innerWidth; x += spacing) {
    S.gridLines.push({x, type:'v'});
  }
  for (let y = spacing; y < S.groundY; y += spacing) {
    S.gridLines.push({y, type:'h'});
  }
}

// ─── Terrain Digging ─────────────────────────────────────────────────
function digTerrain(cx, cy, radius) {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const pxRadius = radius / dpr;
  const startX = Math.max(0, Math.floor(cx - pxRadius));
  const endX = Math.min(S.terrain.length-1, Math.ceil(cx + pxRadius));
  for (let x = startX; x <= endX; x++) {
    const dx = x - cx;
    const depth = Math.sqrt(Math.max(0, pxRadius*pxRadius - dx*dx));
    const digDepth = cy + depth - S.groundY;
    if (digDepth > 0) {
      S.terrain[x] = Math.max(S.terrain[x], digDepth);
    }
  }
}

function getTerrainHeight(x) {
  const ix = clamp(Math.floor(x), 0, S.terrain.length-1);
  return S.terrain[ix];
}

function drawTerrain() {
  const grd = ctx.createLinearGradient(0, S.groundY - 30, 0, innerHeight);
  grd.addColorStop(0, '#1b2430');
  grd.addColorStop(1, '#050607');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(0, S.groundY + S.terrain[0]);
  for (let x = 0; x < S.terrain.length; x++) {
    ctx.lineTo(x, S.groundY + S.terrain[x]);
  }
  ctx.lineTo(S.terrain.length, innerHeight);
  ctx.lineTo(0, innerHeight);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(160,180,200,.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < S.terrain.length; x++) {
    const y = S.groundY + S.terrain[x];
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,.10)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let x = 0; x < S.terrain.length; x++) {
    const y = S.groundY + S.terrain[x] - 1;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.lineWidth = 2;
}

// ─── Background Grid ─────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,.025)';
  ctx.lineWidth = 0.5;
  for (const line of S.gridLines) {
    ctx.beginPath();
    if (line.type === 'v') {
      ctx.moveTo(line.x, 0);
      ctx.lineTo(line.x, S.groundY);
    } else {
      ctx.moveTo(0, line.y);
      ctx.lineTo(innerWidth, line.y);
    }
    ctx.stroke();
  }
}

// ─── Stars ───────────────────────────────────────────────────────────
function drawStars(t) {
  for (const s of S.stars) {
    const tw = 0.5 + Math.sin(t*s.s + s.x*0.01)*0.5;
    ctx.globalAlpha = s.a * tw;
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Cities ──────────────────────────────────────────────────────────
function drawCities() {
  for (const c of S.cityPositions) {
    ctx.save();
    ctx.translate(c.x, c.y);
    if (!c.alive) {
      ctx.fillStyle = '#473f38';
      ctx.globalAlpha = 0.95;
      ctx.fillRect(-12, -8, 24, 6);
      ctx.fillRect(-8, -12, 16, 4);
      ctx.fillRect(-4, -16, 8, 4);
      ctx.fillStyle = '#6b5c50';
      ctx.globalAlpha = 0.8;
      ctx.fillRect(-14, -5, 28, 3);
      ctx.fillRect(-10, -11, 20, 2);
      ctx.restore();
      continue;
    }

    ctx.shadowColor = 'rgba(255,255,255,.2)';
    ctx.shadowBlur = 4;
    ctx.fillStyle = '#d7e0e6';
    ctx.fillRect(-12, -16, 8, 16);
    ctx.fillRect(-4, -12, 8, 12);
    ctx.fillRect(4, -18, 8, 18);
    ctx.fillStyle = '#f4f4f4';
    ctx.fillRect(-13, -4, 26, 4);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.fillRect(-11, -14, 2, 2);
    ctx.fillRect(-7, -14, 2, 2);
    ctx.fillRect(-3, -10, 2, 2);
    ctx.fillRect(1, -10, 2, 2);
    ctx.fillRect(5, -16, 2, 2);
    ctx.fillRect(9, -16, 2, 2);
    ctx.restore();
  }
}

// ─── Missile Bases ───────────────────────────────────────────────────
function drawBases() {
  for (let i = 0; i < S.basePositions.length; i++) {
    const b = S.basePositions[i];
    ctx.save();
    ctx.translate(b.x, b.y);
    if (!b.alive) {
      ctx.fillStyle = '#403734';
      ctx.globalAlpha = 0.95;
      ctx.fillRect(-15, -6, 30, 6);
      ctx.fillRect(-10, -11, 20, 4);
      ctx.fillRect(-6, -15, 12, 3);
      ctx.restore();
      continue;
    }

    const ammo = S.baseAmmo[i];
    ctx.shadowColor = 'rgba(255,255,255,.22)';
    ctx.shadowBlur = 3;
    ctx.fillStyle = '#f3f3f3';
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(-14, 0);
    ctx.lineTo(14, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#9ab4c0';
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(-9, 0);
    ctx.lineTo(9, 0);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,120,90,.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(0, -27);
    ctx.stroke();

    if (Math.sin(S.time * 8 + i) > 0) {
      ctx.fillStyle = '#ff6644';
      ctx.beginPath();
      ctx.arc(0, -28, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    const bars = Math.min(ammo, 10);
    for (let j = 0; j < bars; j++) {
      ctx.fillStyle = '#f6f3ea';
      ctx.fillRect(-11 + j * 2.3, 6, 1.5, 4);
    }
    ctx.restore();
  }
}

// ─── Saucer (Bonus Target) ───────────────────────────────────────────
function spawnSaucer() {
  if (S.saucer) return;
  const fromLeft = Math.random() < 0.5;
  const y = S.groundY * rand(0.12, 0.32);
  const speed = rand(140, 200);
  S.saucer = {
    x: fromLeft ? -50 : innerWidth + 50,
    y,
    vx: fromLeft ? speed : -speed,
    r: 18,
    wobble: rand(0, Math.PI*2),
    alive: true,
    points: [50, 100, 150, 200, 300][Math.floor(rand(0,5))],
    blinkTimer: 0,
  };
  sndSaucerAppear();
}

function drawSaucer() {
  if (!S.saucer) return;
  const s = S.saucer;
  ctx.save();
  ctx.translate(s.x, s.y);
  const dir = s.vx > 0 ? 1 : -1;
  ctx.scale(dir, 1);
  s.wobble += 0.05;
  s.blinkTimer += 0.016;

  // Trail behind saucer
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#ffcc44';
  ctx.shadowColor = 'rgba(255,200,100,.5)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.ellipse(-15, 0, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 0.08;
  ctx.beginPath();
  ctx.ellipse(-25, 0, 8, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Glow
  ctx.shadowColor = 'rgba(255,220,100,.9)';
  ctx.shadowBlur = 16;

  // Main body - flying saucer shape
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.ellipse(0, 0, s.r, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // Dome
  ctx.fillStyle = '#ffe888';
  ctx.beginPath();
  ctx.ellipse(0, -4, 8, 7, 0, Math.PI, Math.PI*2);
  ctx.fill();

  // Lights around rim (blinking)
  ctx.shadowBlur = 0;
  const blinkOn = Math.sin(s.blinkTimer * 12) > 0;
  for (let i = -2; i <= 2; i++) {
    const lx = i * 7;
    if (blinkOn) {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(lx, 5, 2, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#aa2222';
      ctx.beginPath();
      ctx.arc(lx, 5, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Bottom glow
  ctx.fillStyle = 'rgba(255,180,50,.3)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 14, 4, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ─── Meteors ─────────────────────────────────────────────────────────
function spawnMeteor(targetCity, splitCount, splitY, sizeTier) {
  const x = rand(20, innerWidth - 20);
  const y = -20;
  const targets = [];
  for (const c of S.cityPositions) {
    if (c.alive) targets.push({ x: c.x, y: c.y, kind: 'city' });
  }
  for (const b of S.basePositions) {
    if (b.alive) targets.push({ x: b.x, y: b.y, kind: 'base' });
  }
  const target = targets.length ? targets[Math.floor(rand(0, targets.length))] : null;
  const tx = target ? target.x : rand(20, innerWidth - 20);
  const ty = target ? target.y : S.groundY;
  const dx = tx - x, dy = ty - y;
  const len = Math.hypot(dx, dy) || 1;
  const speed = [92, 118, 146, 176][clamp(sizeTier, 0, 3)] + S.wave * 4;
  const radii = [3.5, 4.5, 5.5, 6.5][clamp(sizeTier, 0, 3)];
  S.meteors.push({
    x, y,
    vx: dx / len * speed,
    vy: dy / len * speed,
    r: radii,
    rot: rand(-0.4, 0.4),
    spin: rand(-0.4, 0.4),
    alive: true,
    trail: [],
    splitCount: 0,
    splitY: 0,
    sizeTier,
    targetKind: target ? target.kind : 'city',
  });
}

function splitMeteor(m) {}
function drawMeteor(m) {
  for (let i = 0; i < m.trail.length; i++) {
    const p = m.trail[i];
    const alpha = (i / m.trail.length) * 0.42;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#f4b07b';
    const sz = 2 * (i / m.trail.length) + 1;
    ctx.fillRect(p.x - sz / 2, p.y - sz / 2, sz, sz);
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(Math.atan2(m.vy, m.vx));
  ctx.shadowColor = 'rgba(255,140,60,.65)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = '#fff3d5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-7, 0);
  ctx.lineTo(7, 0);
  ctx.stroke();
  ctx.fillStyle = '#ff9b4d';
  ctx.beginPath();
  ctx.arc(9, 0, Math.max(2.5, m.r), 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff5e7';
  ctx.beginPath();
  ctx.arc(9, 0, Math.max(1.4, m.r * 0.45), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawInterceptor(i) {

// ─── Explosions ──────────────────────────────────────────────────────
function createExplosion(x, y, maxR) {
  S.explosions.push({
    x, y, r: 0, maxR: maxR || 55,
    expanding: true, age: 0, life: 0.55,
  });
  spawnParticles(x, y, '#00ffff', 10, 0.7);
  if (y > S.groundY - maxR - 10) {
    digTerrain(x, y, maxR * 0.8);
  }
  if (maxR > 65) sndBigBoom(); else sndExplosion();
}

function drawExplosion(e) {
  const r = Math.max(0.5, e.r || 0);
  const alpha = clamp(e.life / 0.55, 0, 1);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(0,255,255,.8)';
  ctx.shadowBlur = 24;
  const rg = ctx.createRadialGradient(e.x, e.y, Math.max(0.1, r*0.05), e.x, e.y, r);
  rg.addColorStop(0, 'rgba(255,255,255,0.98)');
  rg.addColorStop(0.15, 'rgba(230,255,255,0.85)');
  rg.addColorStop(0.4, 'rgba(100,255,255,0.45)');
  rg.addColorStop(0.7, 'rgba(0,200,255,0.18)');
  rg.addColorStop(1, 'rgba(0,150,255,0)');
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.arc(e.x, e.y, r, 0, Math.PI*2);
  ctx.fill();
  // Bright center
  if (r > 5) {
    const cg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r*0.12);
    cg.addColorStop(0, 'rgba(255,255,255,0.9)');
    cg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r*0.12, 0, Math.PI*2);
    ctx.fill();
  }
  // Outer ring line (expanding phase)
  if (e.expanding && r > 8) {
    ctx.strokeStyle = 'rgba(0,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Particles ───────────────────────────────────────────────────────
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2;
    const sp = rand(30, 200)*speed;
    S.particles.push({
      x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 20,
      life: rand(0.4, 1.0), color, size: rand(1.2, 3)
    });
  }
}

function drawParticles() {
  for (const p of S.particles) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─── Floating Text ───────────────────────────────────────────────────
function addFloatingText(x, y, text, color, size) {
  S.floatingTexts.push({x, y, text, color, size, life: 1.3, maxLife: 1.3});
}

function drawFloatingTexts() {
  for (const ft of S.floatingTexts) {
    ctx.save();
    ctx.globalAlpha = clamp(ft.life/ft.maxLife, 0, 1);
    ctx.fillStyle = ft.color;
    ctx.font = `900 ${ft.size}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

// ─── Wave Management ─────────────────────────────────────────────────
function startWave() {
  S.wave++;
  S.totalMeteorsInWave = 6 + S.wave * 3 + Math.floor(S.wave * 1.4);
  S.spawnInterval = Math.max(0.24, 1.18 - S.wave * 0.055);
  S.spawnTimer = 0.35;
  for (let i = 0; i < S.basePositions.length; i++) {
    S.basePositions[i].alive = true;
    S.basePositions[i].ammo = 10;
    S.baseAmmo[i] = 10;
  }
  waveAnnEl.textContent = 'WAVE ' + S.wave;
  waveAnnEl.classList.add('show');
  S.waveAnnTimer = 1.8;
  sndWaveStart();
  S.saucerTimer = S.wave % 4 === 0 ? 2.5 : 0;
}

// ─── Spawning ────────────────────────────────────────────────────────
function spawnWaveMeteors() {
  if (S.spawnTimer <= 0 && S.totalMeteorsInWave > 0) {
    const tier = Math.min(3, Math.floor(rand(0, 4)));
    spawnMeteor(null, 0, null, tier);
    S.totalMeteorsInWave--;
    S.spawnTimer = S.spawnInterval * rand(0.75, 1.25);
  }
}

// ─── Launch Interceptor ──────────────────────────────────────────────
function launchInterceptor(tx, ty) {
  if (S.gameOver || !S.running || S.fireCooldown > 0) return;
  let bestBase = null, bestAmmoIdx = -1, bestDist = Infinity;
  for (let i = 0; i < S.basePositions.length; i++) {
    if (S.baseAmmo[i] <= 0) continue;
    const b = S.basePositions[i];
    const d = dist(b.x, b.y, tx, ty);
    if (d < bestDist) { bestDist = d; bestBase = b; bestAmmoIdx = i; }
  }
  if (!bestBase) return;
  const dx = tx - bestBase.x;
  const dy = ty - bestBase.y;
  const len = Math.hypot(dx,dy)||1;
  const speed = 520;
  S.interceptors.push({
    x: bestBase.x, y: bestBase.y - 20,
    vx: dx/len*speed, vy: dy/len*speed,
    tx, ty, trail: []
  });
  S.baseAmmo[bestAmmoIdx]--;
  S.fireCooldown = 0.12;
  S.lastPointerX = tx;
  S.lastPointerY = ty;
  sndLaunch();
}

// ─── Update ──────────────────────────────────────────────────────────
function update(dt) {
  S.time += dt;
  S.spawnTimer -= dt;
  S.fireCooldown = Math.max(0, S.fireCooldown - dt);
  S.screenShake = Math.max(0, S.screenShake - dt * 8);
  if (S.waveAnnTimer > 0) {
    S.waveAnnTimer -= dt;
    if (S.waveAnnTimer <= 0) waveAnnEl.classList.remove('show');
  }

  if (S.saucerTimer > 0) {
    S.saucerTimer -= dt;
    if (S.saucerTimer <= 0) spawnSaucer();
  }

  if (S.saucer) {
    const s = S.saucer;
    s.x += s.vx * dt;
    for (const e of S.explosions) {
      if (dist(e.x, e.y, s.x, s.y) < e.r + s.r) {
        const bonus = Math.round(s.points);
        S.score += bonus;
        spawnParticles(s.x, s.y, '#ffd36c', 28, 1.2);
        spawnParticles(s.x, s.y, '#ff8e4a', 20, 1.0);
        addFloatingText(s.x, s.y - 30, '+' + bonus, '#ffd36c', 20);
        sndSaucerBonus();
        S.saucer = null;
        S.screenShake = Math.max(S.screenShake, 0.15);
        break;
      }
    }
    if (S.saucer && (S.saucer.x < -80 || S.saucer.x > innerWidth + 80)) {
      S.saucer = null;
    }
  }

  spawnWaveMeteors();

  if (S.totalMeteorsInWave <= 0 && S.meteors.length === 0 && S.interceptors.length === 0 && S.explosions.length === 0) {
    const citiesBonus = S.cityPositions.reduce((sum, c) => sum + (c.alive ? 50 * S.wave : 0), 0);
    const missilesBonus = S.baseAmmo.reduce((sum, ammo) => sum + ammo * 5 * S.wave, 0);
    const waveBonus = citiesBonus + missilesBonus;
    if (waveBonus > 0) {
      S.score += waveBonus;
      addFloatingText(innerWidth / 2, S.groundY - 80, 'WAVE BONUS: +' + waveBonus, '#f4f4f4', 18);
    }
    startWave();
    return;
  }

  for (const i of S.interceptors) {
    i.trail.push({ x: i.x, y: i.y });
    if (i.trail.length > 8) i.trail.shift();
    i.x += i.vx * dt;
    i.y += i.vy * dt;
    if (dist(i.x, i.y, i.tx, i.ty) < 14) {
      createExplosion(i.tx, i.ty, 46 + S.wave * 0.9);
      i.dead = true;
    }
    if (i.x < -60 || i.x > innerWidth + 60 || i.y < -60 || i.y > innerHeight + 60) i.dead = true;
  }
  S.interceptors = S.interceptors.filter(i => !i.dead);

  for (const m of S.meteors) {
    m.rot += m.spin * dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 10) m.trail.shift();

    let detonated = false;

    for (const c of S.cityPositions) {
      if (!c.alive) continue;
      if (dist(m.x, m.y, c.x, c.y) < 20) {
        c.alive = false;
        S.lives = Math.max(0, S.lives - 1);
        S.cityDestructions.push({ x: c.x, y: c.y, life: 1.0, maxLife: 1.0, time: 0 });
        spawnParticles(c.x, c.y - 12, '#ffffff', 10, 1.0);
        spawnParticles(c.x, c.y - 12, '#ff8e4a', 18, 1.0);
        S.screenShake = 0.4;
        sndCityHit();
        addFloatingText(c.x, c.y - 46, 'CITY LOST!', '#ff6655', 16);
        detonated = true;
        break;
      }
    }

    if (!detonated) {
      for (const b of S.basePositions) {
        if (!b.alive) continue;
        if (dist(m.x, m.y, b.x, b.y) < 20) {
          b.alive = false;
          b.ammo = 0;
          S.baseAmmo[S.basePositions.indexOf(b)] = 0;
          spawnParticles(b.x, b.y - 8, '#ffffff', 8, 0.8);
          spawnParticles(b.x, b.y - 8, '#ff8e4a', 12, 0.8);
          S.screenShake = 0.25;
          sndCityHit();
          addFloatingText(b.x, b.y - 42, 'BASE HIT!', '#ffd36c', 14);
          detonated = true;
          break;
        }
      }
    }

    if (!detonated) {
      const terrainH = getTerrainHeight(m.x);
      const groundLevel = S.groundY + terrainH;
      if (m.y >= groundLevel - m.r) {
        digTerrain(m.x, m.y, m.r * 1.15);
        spawnParticles(m.x, m.y, '#ff8e4a', 8, 0.6);
        detonated = true;
      }
    }

    if (detonated) {
      createExplosion(m.x, m.y, 26 + m.r * 2);
      m.dead = true;
    }

    if (m.x < -60 || m.x > innerWidth + 60 || m.y < -80 || m.y > innerHeight + 80) {
      m.dead = true;
    }
  }
  S.meteors = S.meteors.filter(m => !m.dead);

  for (const e of S.explosions) {
    e.age += dt;
    e.life -= dt;
    if (e.expanding) {
      e.r = lerp(0, e.maxR, clamp(e.age / 0.16, 0, 1));
      if (e.age >= 0.16) e.expanding = false;
    } else {
      e.r = lerp(e.maxR, 0, clamp((e.age - 0.16) / 0.35, 0, 1));
    }
    for (const m of S.meteors) {
      if (m.dead || !m.alive) continue;
      if (dist(e.x, e.y, m.x, m.y) < e.r + m.r) {
        m.dead = true;
        const basePoints = [25, 50, 75, 100][clamp(m.sizeTier, 0, 3)];
        S.score += basePoints;
        spawnParticles(m.x, m.y, '#ff8e4a', 12, 0.8);
        spawnParticles(m.x, m.y, '#fff4d6', 8, 0.6);
        addFloatingText(m.x, m.y - 25, '+' + basePoints, '#ffffff', 15);
        sndMeteorCrack();
        S.screenShake = Math.max(S.screenShake, 0.08);
      }
    }
    if (e.life <= 0) e.dead = true;
  }
  S.explosions = S.explosions.filter(e => !e.dead);

  for (const p of S.particles) {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 40 * dt;
  }
  S.particles = S.particles.filter(p => p.life > 0);

  for (const ft of S.floatingTexts) {
    ft.life -= dt;
    ft.y -= 30 * dt;
  }
  S.floatingTexts = S.floatingTexts.filter(ft => ft.life > 0);

  for (const cd of S.cityDestructions) {
    cd.time += dt;
    cd.life -= dt;
  }
  S.cityDestructions = S.cityDestructions.filter(cd => cd.life > 0);

  while (S.score >= S.nextBonusCityAt) {
    const deadCity = S.cityPositions.find(c => !c.alive);
    if (deadCity) {
      deadCity.alive = true;
      S.lives = Math.min(6, S.lives + 1);
      addFloatingText(deadCity.x, deadCity.y - 42, 'BONUS CITY!', '#ffffff', 14);
    }
    S.nextBonusCityAt += 10000;
  }

  if (S.cityPositions.every(c => !c.alive)) {
    setTimeout(gameOver, 250);
  }

  if (S.gameOver) {
    S.gameOverTime += dt;
  }
  if (S.score > S.high) {
    S.high = S.score;
    localStorage.setItem('mc_high', String(S.high));
  }
  syncHud();
}

// ─── HUD ─────────────────────────────────────────────────────────────
function syncHud() {
  scoreEl.textContent = 'SCORE: ' + S.score;
  waveEl.textContent = 'WAVE ' + S.wave;
  highEl.textContent = 'HIGH: ' + S.high;
  for (let i = 0; i < 6; i++) {
    const pip = document.getElementById('pip' + i);
    if (pip) pip.classList.toggle('lost', i >= S.lives);
  }
}

// ─── Launch Indicator ────────────────────────────────────────────────
function drawLaunchIndicator() {
  if (!S.running || S.gameOver) return;
  const px = S.lastPointerX, py = S.lastPointerY;
  if (!px || !py) return;
  // Find nearest base with ammo
  let bestBase = null;
  for (let i = 0; i < S.basePositions.length; i++) {
    if (S.baseAmmo[i] <= 0) continue;
    const b = S.basePositions[i];
    if (!bestBase || dist(b.x, b.y, px, py) < dist(bestBase.x, bestBase.y, px, py)) {
      bestBase = b;
    }
  }
  if (!bestBase) return;
  // Draw dotted line from base to target
  ctx.save();
  ctx.setLineDash([3, 5]);
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bestBase.x, bestBase.y - 20);
  ctx.lineTo(px, py);
  ctx.stroke();
  ctx.setLineDash([]);
  // Arrow at target
  const dx = px - bestBase.x;
  const dy = py - bestBase.y;
  const angle = Math.atan2(dy, dx);
  ctx.translate(px, py);
  ctx.rotate(angle);
  ctx.strokeStyle = 'rgba(255,255,255,.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-8, -5);
  ctx.lineTo(0, 0);
  ctx.lineTo(-8, 5);
  ctx.stroke();
  ctx.restore();
}

// ─── Render ──────────────────────────────────────────────────────────
function render(t) {
  ctx.save();
  if (S.screenShake > 0) {
    const sx = (Math.random()-0.5)*S.screenShake*8;
    const sy = (Math.random()-0.5)*S.screenShake*8;
    ctx.translate(sx, sy);
  }
  // Background
  ctx.fillStyle = '#000000';
  ctx.fillRect(-10, -10, innerWidth+20, innerHeight+20);
  // Grid
  drawGrid();
  // Stars
  drawStars(t);
  // Terrain
  drawTerrain();
  // Cities
  drawCities();
  // Bases
  drawBases();
  // Explosions
  for (const e of S.explosions) drawExplosion(e);
  // Meteors
  for (const m of S.meteors) drawMeteor(m);
  // Interceptors
  for (const i of S.interceptors) drawInterceptor(i);
  // Saucer
  drawSaucer();
  // Particles
  drawParticles();
  // Floating texts
  drawFloatingTexts();
  // Launch indicator
  drawLaunchIndicator();
  // Game over flash
  if (S.gameOver && S.gameOverTime < 1.5) {
    ctx.fillStyle = `rgba(255,255,255,${clamp(1.5 - S.gameOverTime, 0, 0.7)})`;
    ctx.fillRect(-10, -10, innerWidth+20, innerHeight+20);
  }
  ctx.restore();
}

// ─── Game Over ───────────────────────────────────────────────────────
function gameOver() {
  S.running = false;
  S.gameOver = true;
  if (S.score > S.high) {
    S.high = S.score;
    localStorage.setItem('mc_high', String(S.high));
  }
  syncHud();
  sndGameOver();
  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <h1>GAME OVER</h1>
    <p>Final Score: <b style="color:#00ff41">${S.score}</b></p>
    <p>High Score: <b style="color:#00ff41">${S.high}</b></p>
    <p>Waves Survived: <b style="color:#00ff41">${S.wave}</b></p>
    <p class="blink" style="margin-top:16px;">[ TAP TO PLAY AGAIN ]</p>
  `;
}

// ─── Start Game ──────────────────────────────────────────────────────
function startGame() {
  S.running = true;
  S.gameOver = false;
  S.paused = false;
  S.pauseReason = '';
  S.score = 0;
  S.time = 0;
  S.wave = 0;
  S.lives = 6;
  S.explosions = [];
  S.interceptors = [];
  S.meteors = [];
  S.particles = [];
  S.floatingTexts = [];
  S.baseAmmo = [];
  S.comboCount = 0;
  S.comboTimer = 0;
  S.comboMult = 1;
  S.screenShake = 0;
  S.waveAnnTimer = 0;
  S.saucer = null;
  S.saucerTimer = 0;
  S.nextBonusCityAt = 10000;
  for (const c of S.cityPositions) { c.alive = true; }
  for (let i = 0; i < S.terrain.length; i++) S.terrain[i] = 0;
  overlayEl.classList.add('hidden');
  if (pauseOverlayEl) pauseOverlayEl.classList.add('hidden');
  startWave();
  syncPauseUi();
  syncHud();
}

// ─── Input ───────────────────────────────────────────────────────────
function beginGesture() {
  if (S.gestureLock) return false;
  S.gestureLock = true;
  setTimeout(() => { S.gestureLock = false; }, 180);
  return true;
}

async function onPointer(e) {
  e.preventDefault();
  if (!beginGesture()) return;
  await primeAudio();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || (e.touches && e.touches[0].clientX) || innerWidth / 2) - rect.left;
  const y = (e.clientY || (e.touches && e.touches[0].clientY) || innerHeight / 2) - rect.top;
  if (!S.running || S.gameOver) {
    startGame();
    return;
  }
  if (S.paused) return;
  launchInterceptor(x, y);
}

canvas.addEventListener('pointerdown', onPointer, {passive:false});
canvas.addEventListener('touchstart', onPointer, {passive:false});
canvas.addEventListener('touchend', async (e) => {
  e.preventDefault();
  if (!beginGesture()) return;
  await primeAudio();
  if (!S.running || S.gameOver) startGame();
}, {passive:false});
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize, 100));
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (S.running && !S.gameOver) setPaused(true, 'hidden');
  } else {
    void resumeAudio();
  }
});
window.addEventListener('pageshow', () => { void resumeAudio(); });
if (muteEl) {
  muteEl.addEventListener('click', async (e) => {
    e.preventDefault();
    e.stopPropagation();
    setMuted(!S.muted);
    if (!S.muted) {
      await resumeAudio();
      primeAudio();
    }
  });
}
if (pauseEl) {
  pauseEl.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    togglePause();
  });
}
window.addEventListener('keydown', async (e) => {
  if (e.code === 'KeyM') {
    e.preventDefault();
    setMuted(!S.muted);
    if (!S.muted) {
      await resumeAudio();
      primeAudio();
    }
    return;
  }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    e.preventDefault();
    togglePause();
    return;
  }
  if (S.paused) {
    e.preventDefault();
    return;
  }
  if (e.code==='Space'||e.code==='Enter') {
    e.preventDefault();
    await primeAudio();
    if (!S.running||S.gameOver) startGame();
    else launchInterceptor(S.lastPointerX||innerWidth/2, S.lastPointerY||innerHeight*0.4);
  }
});

// ─── Game Loop ───────────────────────────────────────────────────────
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - lastTime)/1000);
  lastTime = now;
  if (S.running && !S.paused) update(dt);
  render(now/1000);
  requestAnimationFrame(loop);
}

resize();
syncHud();
syncMuteUi();
updateMasterGain();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
