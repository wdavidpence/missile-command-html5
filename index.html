<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />
<title>Missile Command</title>
<style>
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; overscroll-behavior:none; font-family: "Courier New", monospace; }
  canvas { display:block; width:100vw; height:100vh; image-rendering:pixelated; touch-action:none; }
  .hud { position:fixed; inset:0; pointer-events:none; display:flex; flex-direction:column; align-items:center; padding:8px 12px; box-sizing:border-box; user-select:none; }
  .score-bar { display:flex; justify-content:space-between; width:100%; max-width:600px; }
  .score-item { color:#00ff41; font-size:clamp(11px,2.2vw,15px); font-weight:700; text-shadow:0 0 6px rgba(0,255,65,.6); letter-spacing:.05em; }
  .lives-bar { display:flex; gap:6px; margin-top:4px; }
  .life-pip { width:clamp(8px,1.5vw,12px); height:clamp(8px,1.5vw,12px); background:#00ff41; border-radius:50%; box-shadow:0 0 6px rgba(0,255,65,.8); }
  .life-pip.lost { background:#333; box-shadow:none; }
  .wave-announce { position:fixed; left:50%; top:38%; transform:translate(-50%,-50%); color:#00ff41; font-size:clamp(28px,6vw,48px); font-weight:900; text-shadow:0 0 20px rgba(0,255,65,.8),0 0 40px rgba(0,255,65,.4); opacity:0; pointer-events:none; transition:opacity .3s; letter-spacing:.15em; }
  .wave-announce.show { opacity:1; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; user-select:none; }
  .overlay.hidden { display:none; }
  .overlay h1 { color:#00ff41; font-size:clamp(32px,7vw,56px); text-shadow:0 0 18px rgba(0,255,65,.7),0 0 40px rgba(0,255,65,.3); margin:0 0 10px; letter-spacing:.08em; }
  .overlay p { color:#00cc33; font-size:clamp(12px,2.4vw,16px); margin:4px auto; text-shadow:0 0 8px rgba(0,255,65,.4); }
  .overlay .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .combo { position:fixed; left:50%; top:44%; transform:translate(-50%,-50%); color:#ffff00; font-size:clamp(24px,5vw,40px); font-weight:900; text-shadow:0 0 16px rgba(255,255,0,.8); opacity:0; pointer-events:none; user-select:none; }
  .combo.show { opacity:1; }
  .scanlines { position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px); z-index:10; }
  .vignette { position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%); z-index:9; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="hud">
<div class="score-bar">
  <span class="score-item" id="scoreLabel">SCORE: 0</span>
  <span class="score-item" id="waveLabel">WAVE 1</span>
  <span class="score-item" id="highLabel">HIGH: 0</span>
</div>
<div class="lives-bar" id="livesBar">
  <span class="life-pip" id="pip0"></span>
  <span class="life-pip" id="pip1"></span>
  <span class="life-pip" id="pip2"></span>
</div>
</div>
<div id="waveAnnounce" class="wave-announce"></div>
<div id="combo" class="combo"></div>
<div id="overlay" class="overlay">
  <h1>MISSILE COMMAND</h1>
  <p>Defend your cities from incoming meteors!</p>
  <p>Tap to launch missiles. Dig terrain to deflect attacks.</p>
  <p class="blink" style="margin-top:18px;">[ TAP TO START ]</p>
</div>
<script>
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreLabel');
const waveEl = document.getElementById('waveLabel');
const highEl = document.getElementById('highLabel');
const waveAnnEl = document.getElementById('waveAnnounce');
const comboEl = document.getElementById('combo');
const overlayEl = document.getElementById('overlay');

// ─── State ───────────────────────────────────────────────────────────
const S = {
  running: false, gameOver: false, score: 0,
  high: Number(localStorage.getItem('mc_high') || 0),
  time: 0, wave: 0, lives: 3,
  spawnTimer: 0, spawnInterval: 1.4,
  explosions: [], interceptors: [], meteors: [],
  particles: [], floatingTexts: [], stars: [],
  terrain: null, groundY: 0,
  basePositions: [], cityPositions: [],
  lastPointerX: 0, lastPointerY: 0,
  audio: null, fireCooldown: 0,
  comboCount: 0, comboTimer: 0, comboMult: 1,
  waveAnnTimer: 0, screenShake: 0,
  baseAmmo: [],
  totalMeteorsInWave: 0,
  saucer: null,
  saucerTimer: 0,
  // Background grid
  gridLines: [],
};

function rand(a,b){return Math.random()*(b-a)+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}

// ─── Audio ───────────────────────────────────────────────────────────
function audioInit() {
  try {
    if (!S.audio) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      S.audio = new AC();
    }
    if (S.audio.state === 'suspended') S.audio.resume().catch(()=>{});
  } catch(e) {}
}

function playOsc(cfg) {
  const ac = S.audio; if (!ac) return;
  const run = () => {
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = cfg.type || 'sine';
    osc.frequency.setValueAtTime(cfg.start||440, t);
    if (cfg.end !== undefined) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(1,cfg.end), t + (cfg.dur||0.1));
    }
    const d = cfg.dur||0.1;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(cfg.gain||0.1, t+0.004);
    g.gain.setValueAtTime(cfg.gain||0.1, t+d*0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, t+d);
    osc.connect(g).connect(ac.destination);
    osc.start(t); osc.stop(t+d+0.02);
  };
  if (ac.state==='running') { run(); return; }
  if (!S._resumeP) {
    S._resumeP = ac.resume().catch(()=>{}).finally(()=>{ S._resumeP=null; });
  }
  S._resumeP.then(()=>{ if(ac.state==='running') run(); }).catch(()=>{});
}

// Authentic arcade sounds
function sndLaunch() {
  playOsc({type:'sawtooth',start:300,end:900,dur:0.12,gain:0.10});
}
function sndExplosion() {
  playOsc({type:'sawtooth',start:180,end:40,dur:0.28,gain:0.14});
}
function sndBigBoom() {
  playOsc({type:'sawtooth',start:120,end:25,dur:0.45,gain:0.18});
}
function sndCityHit() {
  playOsc({type:'square',start:400,end:80,dur:0.5,gain:0.15});
  playOsc({type:'sawtooth',start:200,end:60,dur:0.4,gain:0.12});
}
function sndMeteorCrack() {
  playOsc({type:'square',start:1200,end:200,dur:0.08,gain:0.08});
}
function sndSaucerAppear() {
  playOsc({type:'square',start:180,end:320,dur:0.15,gain:0.07});
}
function sndSaucerBonus() {
  playOsc({type:'sine',start:520,end:1180,dur:0.25,gain:0.14});
}
function sndGameOver() {
  playOsc({type:'sawtooth',start:220,end:50,dur:0.8,gain:0.12});
}
function sndWaveStart() {
  playOsc({type:'sine',start:520,end:880,dur:0.2,gain:0.06});
}

// ─── Resize / Layout ─────────────────────────────────────────────────
function resize() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = Math.floor(innerWidth*dpr);
  canvas.height = Math.floor(innerHeight*dpr);
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  S.groundY = innerHeight - Math.max(48, innerHeight*0.08);
  initTerrain();
  layoutEntities();
  buildStars();
  buildGrid();
}

function initTerrain() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  S.terrain = new Float32Array(Math.ceil(innerWidth / dpr * dpr));
}

function layoutEntities() {
  const w = innerWidth;
  const n = 6;
  const spacing = w / (n+1);
  S.cityPositions = [];
  S.basePositions = [];
  for (let i = 0; i < n; i++) {
    const x = spacing * (i+1);
    if (i % 2 === 0) {
      S.cityPositions.push({x, y: S.groundY, alive: true});
    } else {
      S.basePositions.push({x, y: S.groundY, ammo: 18});
    }
  }
  S.baseAmmo = S.basePositions.map(b => b.ammo);
}

function buildStars() {
  const count = Math.round((innerWidth*innerHeight)/25000);
  S.stars = Array.from({length:count}, ()=>({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight*0.55,
    r: rand(0.5,1.5), a: rand(0.2,0.7), s: rand(0.3,1.2)
  }));
}

function buildGrid() {
  S.gridLines = [];
  const spacing = 40;
  for (let x = spacing; x < innerWidth; x += spacing) {
    S.gridLines.push({x, type:'v'});
  }
  for (let y = spacing; y < S.groundY; y += spacing) {
    S.gridLines.push({y, type:'h'});
  }
}

// ─── Terrain Digging ─────────────────────────────────────────────────
function digTerrain(cx, cy, radius) {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const pxRadius = radius / dpr;
  const startX = Math.max(0, Math.floor(cx - pxRadius));
  const endX = Math.min(S.terrain.length-1, Math.ceil(cx + pxRadius));
  for (let x = startX; x <= endX; x++) {
    const dx = x - cx;
    const depth = Math.sqrt(Math.max(0, pxRadius*pxRadius - dx*dx));
    const digDepth = cy + depth - S.groundY;
    if (digDepth > 0) {
      S.terrain[x] = Math.max(S.terrain[x], digDepth);
    }
  }
}

function getTerrainHeight(x) {
  const ix = clamp(Math.floor(x), 0, S.terrain.length-1);
  return S.terrain[ix];
}

function drawTerrain() {
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(0,255,65,.5)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  for (let x = 0; x < S.terrain.length; x++) {
    const y = S.groundY + S.terrain[x];
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  const grd = ctx.createLinearGradient(0, S.groundY, 0, innerHeight);
  grd.addColorStop(0, '#003300');
  grd.addColorStop(1, '#000a00');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(0, S.groundY + S.terrain[0]);
  for (let x = 0; x < S.terrain.length; x++) {
    ctx.lineTo(x, S.groundY + S.terrain[x]);
  }
  ctx.lineTo(S.terrain.length, innerHeight);
  ctx.lineTo(0, innerHeight);
  ctx.closePath();
  ctx.fill();
  // Top edge highlight
  ctx.strokeStyle = 'rgba(0,255,65,.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < S.terrain.length; x++) {
    const y = S.groundY + S.terrain[x];
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.lineWidth = 2;
}

// ─── Background Grid ─────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,255,65,.06)';
  ctx.lineWidth = 0.5;
  for (const line of S.gridLines) {
    ctx.beginPath();
    if (line.type === 'v') {
      ctx.moveTo(line.x, 0);
      ctx.lineTo(line.x, S.groundY);
    } else {
      ctx.moveTo(0, line.y);
      ctx.lineTo(innerWidth, line.y);
    }
    ctx.stroke();
  }
}

// ─── Stars ───────────────────────────────────────────────────────────
function drawStars(t) {
  for (const s of S.stars) {
    const tw = 0.5 + Math.sin(t*s.s + s.x*0.01)*0.5;
    ctx.globalAlpha = s.a * tw;
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Cities ──────────────────────────────────────────────────────────
function drawCities() {
  for (const c of S.cityPositions) {
    ctx.save();
    ctx.translate(c.x, c.y);
    if (!c.alive) {
      // Rubble pile - static scattered blocks
      ctx.fillStyle = '#2a3322';
      ctx.globalAlpha = 0.6;
      const seed = Math.abs(c.x * 7 + c.y * 13);
      for (let i = -4; i <= 4; i++) {
        const w = ((seed + i*17) % 5) + 3;
        const h = ((seed + i*23) % 3) + 2;
        ctx.fillRect(i*w*0.7 - w/2, -h/2, w, h);
      }
      // Small scattered debris
      ctx.fillStyle = '#3a4433';
      for (let i = -5; i <= 5; i++) {
        const sz = ((seed + i*31) % 3) + 1;
        ctx.fillRect(i*4 - sz/2, -sz/2, sz, sz);
      }
      ctx.restore();
      continue;
    }
    // Arcade-style triangular pyramid
    ctx.shadowColor = 'rgba(0,255,65,.7)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#00ff41';
    ctx.beginPath();
    ctx.moveTo(0, -36);
    ctx.lineTo(-16, 0);
    ctx.lineTo(16, 0);
    ctx.closePath();
    ctx.fill();
    // Inner triangle
    ctx.fillStyle = '#00cc33';
    ctx.beginPath();
    ctx.moveTo(0, -28);
    ctx.lineTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.closePath();
    ctx.fill();
    // Window lines (flickering)
    ctx.fillStyle = '#88ff88';
    ctx.shadowBlur = 0;
    const flicker = Math.sin(S.time*4 + c.x*0.1) > 0.2 ? 1 : 0.4;
    ctx.globalAlpha = flicker;
    for (let row = 0; row < 3; row++) {
      const yy = -8 - row*9;
      const ww = 12 - row*3;
      ctx.fillRect(-ww/2, yy, ww, 2);
    }
    ctx.globalAlpha = 1;
    // Antenna with blink
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -36);
    ctx.lineTo(0, -44);
    ctx.stroke();
    if (Math.sin(S.time*5) > 0) {
      ctx.fillStyle = '#00ff41';
      ctx.beginPath();
      ctx.arc(0, -44, 2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ─── Missile Bases ───────────────────────────────────────────────────
function drawBases() {
  for (let i = 0; i < S.basePositions.length; i++) {
    const b = S.basePositions[i];
    const ammo = S.baseAmmo[i];
    ctx.save();
    ctx.translate(b.x, b.y);
    // Base triangle (rocket silo shape)
    ctx.fillStyle = '#00ff41';
    ctx.shadowColor = 'rgba(0,255,65,.5)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(-14, 0);
    ctx.lineTo(14, 0);
    ctx.closePath();
    ctx.fill();
    // Inner triangle
    ctx.fillStyle = '#00cc33';
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(-9, 0);
    ctx.lineTo(9, 0);
    ctx.closePath();
    ctx.fill();
    // Antenna
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(0, -28);
    ctx.stroke();
    // Blinking light
    if (Math.sin(S.time*6 + i*2) > 0) {
      ctx.fillStyle = '#00ff41';
      ctx.shadowColor = 'rgba(0,255,65,.8)';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(0, -28, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    // Ammo display
    const ammoY = 8;
    const lineW = 3;
    const gap = 2;
    for (let j = 0; j < Math.min(ammo, 20); j++) {
      const lx = -((Math.min(ammo,20)-1)*(lineW+gap))/2 + j*(lineW+gap);
      ctx.fillStyle = j < 5 ? '#00ff41' : '#00aa33';
      ctx.fillRect(lx, ammoY, lineW, 2);
    }
    if (ammo > 20) {
      ctx.fillStyle = '#00ff41';
      ctx.font = '10px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(ammo+'', 0, ammoY + 10);
    }
    ctx.restore();
  }
}

// ─── Saucer (Bonus Target) ───────────────────────────────────────────
function spawnSaucer() {
  if (S.saucer) return;
  const fromLeft = Math.random() < 0.5;
  const y = S.groundY * rand(0.12, 0.32);
  const speed = rand(140, 200);
  S.saucer = {
    x: fromLeft ? -50 : innerWidth + 50,
    y,
    vx: fromLeft ? speed : -speed,
    r: 18,
    wobble: rand(0, Math.PI*2),
    alive: true,
    points: [50, 100, 150, 200, 300][Math.floor(rand(0,5))],
    blinkTimer: 0,
  };
  sndSaucerAppear();
}

function drawSaucer() {
  if (!S.saucer) return;
  const s = S.saucer;
  ctx.save();
  ctx.translate(s.x, s.y);
  const dir = s.vx > 0 ? 1 : -1;
  ctx.scale(dir, 1);
  s.wobble += 0.05;
  s.blinkTimer += 0.016;

  // Glow
  ctx.shadowColor = 'rgba(255,220,100,.9)';
  ctx.shadowBlur = 16;

  // Main body - flying saucer shape
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.ellipse(0, 0, s.r, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // Dome
  ctx.fillStyle = '#ffe888';
  ctx.beginPath();
  ctx.ellipse(0, -4, 8, 7, 0, Math.PI, Math.PI*2);
  ctx.fill();

  // Lights around rim (blinking)
  ctx.shadowBlur = 0;
  const blinkOn = Math.sin(s.blinkTimer * 12) > 0;
  for (let i = -2; i <= 2; i++) {
    const lx = i * 7;
    if (blinkOn) {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(lx, 5, 2, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#aa2222';
      ctx.beginPath();
      ctx.arc(lx, 5, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Bottom glow
  ctx.fillStyle = 'rgba(255,180,50,.3)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 14, 4, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ─── Meteors ─────────────────────────────────────────────────────────
function spawnMeteor(targetCity, splitCount, splitY, sizeTier) {
  const x = rand(20, innerWidth-20);
  const y = -20;
  const speed = [65, 90, 120, 155][clamp(sizeTier,0,3)] + S.wave * 3;
  // Target any alive city, or random
  const alive = S.cityPositions.filter(c => c.alive);
  const target = alive.length ? alive[Math.floor(rand(0, alive.length))] : null;
  const tx = target ? target.x : rand(20, innerWidth-20);
  const ty = S.groundY;
  const dx = tx - x, dy = ty - y;
  const len = Math.hypot(dx,dy)||1;
  const radii = [14, 10, 7, 4.5][clamp(sizeTier,0,3)];
  S.meteors.push({
    x, y, vx: dx/len*speed, vy: dy/len*speed,
    r: radii, rot: rand(0,Math.PI*2), spin: rand(-3,3),
    alive: true, trail: [],
    splitCount, splitY: splitY || S.groundY * rand(0.25, 0.55),
    sizeTier
  });
}

function splitMeteor(m) {
  // Split flash
  spawnParticles(m.x, m.y, '#ff8800', 16, 1.5);
  spawnParticles(m.x, m.y, '#ffff00', 10, 1.2);
  const numSplits = Math.floor(rand(2, 5));
  const newTier = clamp(m.sizeTier + 1, 0, 3);
  const newSplitCount = Math.max(0, m.splitCount - 1);
  for (let i = 0; i < numSplits; i++) {
    const parentDir = Math.atan2(m.vy, m.vx);
    const newSpeed = [65, 90, 120, 155][clamp(newTier,0,3)] + S.wave * 3;
    const angle = rand(-0.8, 0.8);
    const splitY = S.groundY * rand(0.2, 0.5);
    const alive = S.cityPositions.filter(c => c.alive);
    const target = alive.length ? alive[Math.floor(rand(0, alive.length))] : null;
    const tx = target ? target.x : rand(20, innerWidth-20);
    const ty = S.groundY;
    const dx = tx - m.x, dy = ty - m.y;
    const len = Math.hypot(dx,dy)||1;
    const radii = [14, 10, 7, 4.5][clamp(newTier,0,3)];
    S.meteors.push({
      x: m.x + rand(-5,5), y: m.y + rand(-5,5),
      vx: dx/len*newSpeed, vy: dy/len*newSpeed,
      r: radii, rot: rand(0,Math.PI*2), spin: rand(-3,3),
      alive: true, trail: [],
      splitCount: newSplitCount,
      splitY: newSplitCount > 0 ? splitY : S.groundY * 2,
      sizeTier: newTier
    });
  }
  m.dead = true;
}

function drawMeteor(m) {
  // Segmented trail
  for (let i = 0; i < m.trail.length; i++) {
    const p = m.trail[i];
    const alpha = (i / m.trail.length) * 0.5;
    const size = m.r * 0.25 * (i / m.trail.length);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(m.rot);
  ctx.shadowColor = 'rgba(255,50,0,.8)';
  ctx.shadowBlur = 14;
  const grd = ctx.createRadialGradient(-m.r*0.2, -m.r*0.2, 1, 0, 0, m.r);
  grd.addColorStop(0, '#ffcc44');
  grd.addColorStop(0.3, '#ff6600');
  grd.addColorStop(0.7, '#cc3300');
  grd.addColorStop(1, '#661100');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, m.r, 0, Math.PI*2);
  ctx.fill();
  // Segmented lines
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,.3)';
  ctx.lineWidth = 1;
  for (let s = 0; s < 3; s++) {
    const a = s * Math.PI * 2 / 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a)*m.r, Math.sin(a)*m.r);
    ctx.stroke();
  }
  // Highlight
  ctx.fillStyle = 'rgba(255,255,200,.35)';
  ctx.beginPath();
  ctx.arc(-m.r*0.25, -m.r*0.25, m.r*0.35, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ─── Interceptors ────────────────────────────────────────────────────
function drawInterceptor(i) {
  // Smoke trail
  for (let j = 0; j < i.trail.length; j++) {
    const p = i.trail[j];
    const alpha = (j / i.trail.length) * 0.4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    const sz = 2.5 * (j/i.trail.length);
    ctx.fillRect(p.x - sz/2, p.y - sz/2, sz, sz);
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(i.x, i.y);
  ctx.rotate(Math.atan2(i.vy, i.vx));
  ctx.strokeStyle = '#ffffff';
  ctx.shadowColor = 'rgba(255,255,255,.9)';
  ctx.shadowBlur = 10;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(8, 0);
  ctx.stroke();
  // Nose cone
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(5, -3.5);
  ctx.lineTo(5, 3.5);
  ctx.closePath();
  ctx.fill();
  // Fins
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.lineTo(-14, -5);
  ctx.moveTo(-10, 0);
  ctx.lineTo(-14, 5);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Explosions ──────────────────────────────────────────────────────
function createExplosion(x, y, maxR) {
  S.explosions.push({
    x, y, r: 0, maxR: maxR || 55,
    expanding: true, age: 0, life: 0.55,
  });
  spawnParticles(x, y, '#00ffff', 10, 0.7);
  if (y > S.groundY - maxR - 10) {
    digTerrain(x, y, maxR * 0.8);
  }
  if (maxR > 65) sndBigBoom(); else sndExplosion();
}

function drawExplosion(e) {
  const alpha = clamp(e.life / 0.55, 0, 1);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(0,255,255,.8)';
  ctx.shadowBlur = 24;
  const rg = ctx.createRadialGradient(e.x, e.y, e.r*0.05, e.x, e.y, e.r);
  rg.addColorStop(0, 'rgba(255,255,255,0.98)');
  rg.addColorStop(0.15, 'rgba(230,255,255,0.85)');
  rg.addColorStop(0.4, 'rgba(100,255,255,0.45)');
  rg.addColorStop(0.7, 'rgba(0,200,255,0.18)');
  rg.addColorStop(1, 'rgba(0,150,255,0)');
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
  ctx.fill();
  // Bright center
  if (e.r > 5) {
    const cg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r*0.12);
    cg.addColorStop(0, 'rgba(255,255,255,0.9)');
    cg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r*0.12, 0, Math.PI*2);
    ctx.fill();
  }
  // Outer ring line (expanding phase)
  if (e.expanding && e.r > 8) {
    ctx.strokeStyle = 'rgba(0,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Particles ───────────────────────────────────────────────────────
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2;
    const sp = rand(30, 200)*speed;
    S.particles.push({
      x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 20,
      life: rand(0.4, 1.0), color, size: rand(1.2, 3)
    });
  }
}

function drawParticles() {
  for (const p of S.particles) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─── Floating Text ───────────────────────────────────────────────────
function addFloatingText(x, y, text, color, size) {
  S.floatingTexts.push({x, y, text, color, size, life: 1.3, maxLife: 1.3});
}

function drawFloatingTexts() {
  for (const ft of S.floatingTexts) {
    ctx.save();
    ctx.globalAlpha = clamp(ft.life/ft.maxLife, 0, 1);
    ctx.fillStyle = ft.color;
    ctx.font = `900 ${ft.size}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

// ─── Combo ───────────────────────────────────────────────────────────
function addCombo() {
  S.comboCount++;
  S.comboTimer = 2.0;
  S.comboMult = Math.min(1 + S.comboCount, 8);
  if (S.comboCount >= 2) {
    comboEl.textContent = S.comboMult + 'x COMBO!';
    comboEl.classList.add('show');
    setTimeout(()=>comboEl.classList.remove('show'), 700);
  }
}

// ─── Wave Management ─────────────────────────────────────────────────
function startWave() {
  S.wave++;
  S.totalMeteorsInWave = 5 + S.wave * 3 + Math.floor(S.wave * S.wave * 0.15);
  S.spawnInterval = Math.max(0.28, 1.35 - S.wave * 0.07);
  S.spawnTimer = 0.3;
  // Refill ammo
  for (let i = 0; i < S.baseAmmo.length; i++) {
    S.baseAmmo[i] = Math.min(25, 16 + Math.floor(S.wave * 0.5));
  }
  // Wave announcement
  waveAnnEl.textContent = 'WAVE ' + S.wave;
  waveAnnEl.classList.add('show');
  S.waveAnnTimer = 2.0;
  sndWaveStart();
  // Saucer on every 5th wave
  S.saucerTimer = S.wave % 5 === 0 ? 3.0 : 0;
}

// ─── Spawning ────────────────────────────────────────────────────────
function spawnWaveMeteors() {
  if (S.spawnTimer <= 0 && S.totalMeteorsInWave > 0) {
    const maxSplits = Math.min(3, 1 + Math.floor(S.wave / 3));
    const splitDepth = Math.floor(rand(0, maxSplits + 1));
    spawnMeteor(null, splitDepth, null, 0);
    S.totalMeteorsInWave--;
    S.spawnTimer = S.spawnInterval * rand(0.7, 1.2);
  }
}

// ─── Launch Interceptor ──────────────────────────────────────────────
function launchInterceptor(tx, ty) {
  if (S.gameOver || !S.running || S.fireCooldown > 0) return;
  let bestBase = null, bestAmmoIdx = -1, bestDist = Infinity;
  for (let i = 0; i < S.basePositions.length; i++) {
    if (S.baseAmmo[i] <= 0) continue;
    const b = S.basePositions[i];
    const d = dist(b.x, b.y, tx, ty);
    if (d < bestDist) { bestDist = d; bestBase = b; bestAmmoIdx = i; }
  }
  if (!bestBase) return;
  const dx = tx - bestBase.x;
  const dy = ty - bestBase.y;
  const len = Math.hypot(dx,dy)||1;
  const speed = 520;
  S.interceptors.push({
    x: bestBase.x, y: bestBase.y - 20,
    vx: dx/len*speed, vy: dy/len*speed,
    tx, ty, trail: []
  });
  S.baseAmmo[bestAmmoIdx]--;
  S.fireCooldown = 0.12;
  S.lastPointerX = tx;
  S.lastPointerY = ty;
  sndLaunch();
}

// ─── Update ──────────────────────────────────────────────────────────
function update(dt) {
  S.time += dt;
  S.spawnTimer -= dt;
  S.fireCooldown = Math.max(0, S.fireCooldown - dt);
  S.screenShake = Math.max(0, S.screenShake - dt * 8);
  if (S.waveAnnTimer > 0) {
    S.waveAnnTimer -= dt;
    if (S.waveAnnTimer <= 0) waveAnnEl.classList.remove('show');
  }
  // Combo timer
  if (S.comboTimer > 0) {
    S.comboTimer -= dt;
    if (S.comboTimer <= 0) { S.comboCount = 0; S.comboMult = 1; }
  }
  // Saucer timer
  if (S.saucerTimer > 0) {
    S.saucerTimer -= dt;
    if (S.saucerTimer <= 0) spawnSaucer();
  }
  // Saucer update
  if (S.saucer) {
    const s = S.saucer;
    s.x += s.vx * dt;
    // Check explosion collision
    for (const e of S.explosions) {
      if (!s) break;
      if (dist(e.x, e.y, s.x, s.y) < e.r + s.r) {
        addCombo();
        const bonus = Math.round(s.points * S.comboMult);
        S.score += bonus;
        spawnParticles(s.x, s.y, '#ffcc44', 24, 1.2);
        spawnParticles(s.x, s.y, '#ff6644', 16, 1.0);
        addFloatingText(s.x, s.y - 30, '+' + bonus, '#ffcc44', 20);
        sndSaucerBonus();
        S.saucer = null;
        S.screenShake = Math.max(S.screenShake, 0.15);
        break;
      }
    }
    // Off screen
    if (S.saucer && (S.saucer.x < -80 || S.saucer.x > innerWidth + 80)) {
      S.saucer = null;
    }
  }
  // Spawn meteors
  spawnWaveMeteors();
  // Check wave complete
  if (S.totalMeteorsInWave <= 0 && S.meteors.length === 0 && S.interceptors.length === 0 && S.explosions.length === 0) {
    // Wave bonus: surviving cities
    let waveBonus = 0;
    for (const c of S.cityPositions) {
      if (c.alive) waveBonus += 100;
    }
    if (waveBonus > 0) {
      S.score += waveBonus;
      addFloatingText(innerWidth/2, S.groundY - 80, 'WAVE BONUS: +' + waveBonus, '#00ff41', 18);
    }
    startWave();
    return;
  }
  // Update interceptors
  for (const i of S.interceptors) {
    i.trail.push({x:i.x, y:i.y});
    if (i.trail.length > 8) i.trail.shift();
    i.x += i.vx*dt;
    i.y += i.vy*dt;
    if (dist(i.x,i.y,i.tx,i.ty) < 14) {
      createExplosion(i.tx, i.ty, 52 + S.wave * 1.2);
      i.dead = true;
    }
    if (i.x < -60 || i.x > innerWidth+60 || i.y < -60 || i.y > innerHeight+60) i.dead = true;
  }
  S.interceptors = S.interceptors.filter(i => !i.dead);
  // Update meteors
  for (const m of S.meteors) {
    m.rot += m.spin * dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.trail.push({x:m.x, y:m.y});
    if (m.trail.length > 12) m.trail.shift();
    // Check splitting
    if (m.splitCount > 0 && m.y >= m.splitY) {
      splitMeteor(m);
    }
    // Check terrain collision
    const terrainH = getTerrainHeight(m.x);
    const groundLevel = S.groundY + terrainH;
    if (m.y >= groundLevel - m.r) {
      m.dead = true;
      // Check if hitting a city
      for (const c of S.cityPositions) {
        if (!c.alive) continue;
        if (Math.abs(c.x - m.x) < 22 && Math.abs(c.y - m.y) < 30) {
          c.alive = false;
          S.lives--;
          spawnParticles(c.x, c.y-15, '#00ff41', 30, 1.2);
          spawnParticles(c.x, c.y-15, '#ff4400', 15, 0.8);
          S.screenShake = 0.4;
          sndCityHit();
          addFloatingText(c.x, c.y-50, 'CITY LOST!', '#ff4444', 16);
          if (S.lives <= 0) { setTimeout(gameOver, 300); }
          break;
        }
      }
      // Deflect off terrain hills
      const leftH = getTerrainHeight(m.x - 4);
      const rightH = getTerrainHeight(m.x + 4);
      const slope = rightH - leftH;
      if (Math.abs(slope) > 1.5) {
        m.vy = -Math.abs(m.vy) * 0.5;
        m.vx += slope * 8;
        m.dead = false;
        spawnParticles(m.x, m.y, '#ff8800', 6, 0.4);
      } else {
        digTerrain(m.x, m.y, m.r * 2);
        spawnParticles(m.x, m.y, '#ff6600', 8, 0.5);
      }
    }
  }
  S.meteors = S.meteors.filter(m => !m.dead);
  // Update explosions
  for (const e of S.explosions) {
    e.age += dt;
    e.life -= dt;
    if (e.expanding) {
      e.r = lerp(0, e.maxR, e.age / 0.16);
      if (e.age >= 0.16) e.expanding = false;
    } else {
      e.r = lerp(e.maxR, 0, (e.age - 0.16) / 0.35);
    }
    // Check meteor collisions
    for (const m of S.meteors) {
      if (m.dead || !m.alive) continue;
      if (dist(e.x, e.y, m.x, m.y) < e.r + m.r) {
        m.dead = true;
        const basePoints = [60, 80, 100, 120][clamp(m.sizeTier,0,3)];
        addCombo();
        const totalPts = Math.round(basePoints * S.comboMult);
        S.score += totalPts;
        const minAmmo = Math.min(...S.baseAmmo);
        if (minAmmo <= 1) {
          S.score += 50;
          addFloatingText(m.x, m.y-20, '+50 BONUS!', '#ff8800', 14);
        }
        spawnParticles(m.x, m.y, '#ff4400', 12, 0.8);
        spawnParticles(m.x, m.y, '#ffcc00', 8, 0.6);
        addFloatingText(m.x, m.y-25, '+'+totalPts, '#ffff00', 15);
        sndMeteorCrack();
        S.screenShake = Math.max(S.screenShake, 0.08);
      }
    }
    if (e.life <= 0) e.dead = true;
  }
  S.explosions = S.explosions.filter(e => !e.dead);
  // Update particles
  for (const p of S.particles) {
    p.life -= dt;
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.vy += 40*dt;
  }
  S.particles = S.particles.filter(p => p.life > 0);
  // Update floating texts
  for (const ft of S.floatingTexts) {
    ft.life -= dt;
    ft.y -= 30*dt;
  }
  S.floatingTexts = S.floatingTexts.filter(ft => ft.life > 0);
  // High score
  if (S.score > S.high) {
    S.high = S.score;
    localStorage.setItem('mc_high', String(S.high));
  }
  syncHud();
}

// ─── HUD ─────────────────────────────────────────────────────────────
function syncHud() {
  scoreEl.textContent = 'SCORE: ' + S.score;
  waveEl.textContent = 'WAVE ' + S.wave;
  highEl.textContent = 'HIGH: ' + S.high;
  for (let i = 0; i < 3; i++) {
    const pip = document.getElementById('pip' + i);
    if (pip) pip.classList.toggle('lost', i >= S.lives);
  }
}

// ─── Render ──────────────────────────────────────────────────────────
function render(t) {
  ctx.save();
  if (S.screenShake > 0) {
    const sx = (Math.random()-0.5)*S.screenShake*8;
    const sy = (Math.random()-0.5)*S.screenShake*8;
    ctx.translate(sx, sy);
  }
  // Background
  ctx.fillStyle = '#000000';
  ctx.fillRect(-10, -10, innerWidth+20, innerHeight+20);
  // Grid
  drawGrid();
  // Stars
  drawStars(t);
  // Terrain
  drawTerrain();
  // Cities
  drawCities();
  // Bases
  drawBases();
  // Explosions
  for (const e of S.explosions) drawExplosion(e);
  // Meteors
  for (const m of S.meteors) drawMeteor(m);
  // Interceptors
  for (const i of S.interceptors) drawInterceptor(i);
  // Saucer
  drawSaucer();
  // Particles
  drawParticles();
  // Floating texts
  drawFloatingTexts();
  ctx.restore();
}

// ─── Game Over ───────────────────────────────────────────────────────
function gameOver() {
  S.running = false;
  S.gameOver = true;
  if (S.score > S.high) {
    S.high = S.score;
    localStorage.setItem('mc_high', String(S.high));
  }
  syncHud();
  sndGameOver();
  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <h1>GAME OVER</h1>
    <p>Final Score: <b style="color:#00ff41">${S.score}</b></p>
    <p>High Score: <b style="color:#00ff41">${S.high}</b></p>
    <p>Waves Survived: <b style="color:#00ff41">${S.wave}</b></p>
    <p class="blink" style="margin-top:16px;">[ TAP TO PLAY AGAIN ]</p>
  `;
}

// ─── Start Game ──────────────────────────────────────────────────────
function startGame() {
  S.running = true;
  S.gameOver = false;
  S.score = 0;
  S.time = 0;
  S.wave = 0;
  S.lives = 3;
  S.explosions = [];
  S.interceptors = [];
  S.meteors = [];
  S.particles = [];
  S.floatingTexts = [];
  S.baseAmmo = [];
  S.comboCount = 0;
  S.comboTimer = 0;
  S.comboMult = 1;
  S.screenShake = 0;
  S.waveAnnTimer = 0;
  S.saucer = null;
  S.saucerTimer = 0;
  for (const c of S.cityPositions) { c.alive = true; }
  for (let i = 0; i < S.terrain.length; i++) S.terrain[i] = 0;
  overlayEl.classList.add('hidden');
  startWave();
  syncHud();
}

// ─── Input ───────────────────────────────────────────────────────────
function onPointer(e) {
  e.preventDefault();
  audioInit();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || (e.touches && e.touches[0].clientX) || innerWidth/2) - rect.left;
  const y = (e.clientY || (e.touches && e.touches[0].clientY) || innerHeight/2) - rect.top;
  if (!S.running || S.gameOver) {
    startGame();
    return;
  }
  launchInterceptor(x, y);
}

canvas.addEventListener('pointerdown', onPointer, {passive:false});
canvas.addEventListener('touchstart', onPointer, {passive:false});
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize, 100));
window.addEventListener('keydown', (e) => {
  if (e.code==='Space'||e.code==='Enter') {
    e.preventDefault();
    audioInit();
    if (!S.running||S.gameOver) startGame();
    else launchInterceptor(S.lastPointerX||innerWidth/2, S.lastPointerY||innerHeight*0.4);
  }
});

// ─── Game Loop ───────────────────────────────────────────────────────
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - lastTime)/1000);
  lastTime = now;
  if (S.running) update(dt);
  render(now/1000);
  requestAnimationFrame(loop);
}

resize();
syncHud();
requestAnimationFrame(loop);

})();
</script>
